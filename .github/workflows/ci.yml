name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN across all jobs; the `changes` job
# widens to pull-requests:read for paths-filter. No job here writes.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Detect which areas a change touches so expensive specialist checks only run
  # when their contracts can be affected. CI Success is the sole required check.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      webui: ${{ steps.filter.outputs.webui }}
      knx: ${{ steps.filter.outputs.knx }}
      deps: ${{ steps.filter.outputs.deps }}
      macos: ${{ steps.filter.outputs.macos }}
      docker: ${{ steps.filter.outputs.docker }}
      integration: ${{ steps.filter.outputs.integration }}
      windows: ${{ steps.filter.outputs.windows }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so paths-filter can resolve the base commit on push:main
          # (a shallow checkout can leave the base missing and mis-detect changes).
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'openapi.json'
              - '.config/**'
              - 'rust-toolchain*'
            webui:
              - 'webui/**'
            knx:
              - 'knx/**'
              - 'snapdog/src/knx/**'
              - 'snapdog/src/api/routes/knx.rs'
              - 'snapdog/tests/knx_golden.rs'
              - 'xtask/src/**'
              - 'xtask/Cargo.toml'
              - 'snapdog/Cargo.toml'
              - 'Cargo.lock'
            deps:
              - '**/Cargo.toml'
              - 'Cargo.lock'
            macos:
              - 'macos-helper/**'
            docker:
              - '.dockerignore'
              - 'Dockerfile'
              - 'Dockerfile.client'
            integration:
              - '.config/nextest.toml'
              - 'snapdog/src/mqtt/**'
              - 'snapdog/src/subsonic/**'
              - 'snapdog/src/snapcast/**'
              - 'snapdog/tests/integration.rs'
              - 'snapdog/tests/mqtt_tier2.rs'
              - 'snapdog/tests/snapcast_rpc.rs'
              - 'snapdog/tests/snapserver_e2e.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
            windows:
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain*'
              - 'snapdog-client/**'
              - 'snapdog-common/**'
              - 'snapdog/src/audio/**'
              - 'snapdog/src/receiver/**'
              - 'snapdog/src/snapcast/**'
            workflows:
              - '.github/workflows/**'

  workflow-lint:
    name: Workflow Lint
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate GitHub Actions workflows
        # release.yml has a deliberate compact A && B || C shell expression.
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 -ignore SC2015

  i18n:
    name: macOS i18n completeness
    needs: changes
    if: needs.changes.outputs.macos == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: String Catalog fully translated
        run: python3 macos-helper/check-i18n.py

  commit-convention:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate squash-merge title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|refactor|docs|test|ci|chore|perf|style|build|revert)(\(.+\))?!?: .+'
          if ! printf '%s' "$PR_TITLE" | grep -qE "$pattern"; then
            echo "::error::PR title is not a Conventional Commit: $PR_TITLE"
            echo "Format: <type>(<scope>): <description>  — types: feat, fix, refactor, docs, test, ci, chore, perf, style, build, revert (optionally '!' for breaking)."
            exit 1
          fi

  rust-core:
    name: Rust Core
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - name: Skip WebUI build
        run: echo "SKIP_WEBUI_BUILD=1" >> "$GITHUB_ENV"
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (default / embedded)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (process mode)
        run: cargo clippy -p snapdog --no-default-features --features snapcast-process --all-targets -- -D warnings
      - name: Workspace tests
        run: cargo test --workspace --locked
      - name: Test-harness zone-player tests
        run: cargo test -p snapdog --features test-harness --test zone_player
      - name: API and config contracts
        run: cargo test -p snapdog --test openapi_contract --test config_contract
      - name: AirPlay receiver firewall
        run: cargo test -p snapdog --features ap2 --lib receiver::airplay

  webui:
    name: WebUI
    needs: changes
    if: needs.changes.outputs.webui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: i18n completeness
        working-directory: webui
        run: npm run i18n:check
      - name: Install dependencies
        working-directory: webui
        run: npm ci
      - name: Lint
        working-directory: webui
        run: npm run lint
      - name: Typecheck
        working-directory: webui
        run: npm run typecheck
      - name: Build
        working-directory: webui
        run: npm run build

  docker-contract:
    name: Docker Contract
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Validate Dockerfiles with BuildKit
        run: |
          set -euo pipefail
          docker buildx build --check --file Dockerfile .
          docker buildx build --check --file Dockerfile.client .

  integration-tests:
    name: Integration Tests
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    services:
      navidrome:
        image: deluan/navidrome:latest
        ports:
          - 4533:4533
        env:
          ND_SCANSCHEDULE: "0"
          ND_LOGLEVEL: error
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Skip WebUI build (placeholder is generated by snapdog/build.rs)
        shell: bash
        run: echo "SKIP_WEBUI_BUILD=1" >> "$GITHUB_ENV"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install snapserver + mosquitto
        run: |
          sudo apt-get update
          sudo apt-get install -y snapserver libasound2-dev libavahi-compat-libdnssd-dev mosquitto
          printf "listener 1883\nallow_anonymous true\n" | sudo tee /etc/mosquitto/conf.d/ci.conf
          sudo systemctl restart mosquitto
      - name: Create test env
        run: |
          cat > .env.test << EOF
          SNAPDOG_TEST_SUBSONIC_URL=http://localhost:4533
          SNAPDOG_TEST_SUBSONIC_USERNAME=admin
          SNAPDOG_TEST_SUBSONIC_PASSWORD=admin
          SNAPDOG_TEST_MQTT_BROKER=localhost:1883
          SNAPDOG_TEST_MQTT_USERNAME=
          SNAPDOG_TEST_MQTT_PASSWORD=
          EOF
      - name: Run tier-2 integration tests (process feature)
        # nextest applies the serial `tier2-real-service` group + tier-2-only
        # retries from .config/nextest.toml; each test loud-skips if its service
        # is unavailable. Covers integration (Subsonic/MQTT), the snapcast JSON-RPC
        # firewall, the real-snapserver e2e (IT-T56), and real-mosquitto (IT-T32).
        run: |
          cargo nextest run -p snapdog --profile ci --no-default-features --features snapcast-process \
            -E 'binary(integration) | binary(snapcast_rpc) | binary(snapserver_e2e) | binary(mqtt_tier2)'
      - name: Upload tier-2 test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: tier2-nextest-report
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      # Prebuilt binary — no source compile (was `cargo install cargo-audit`, ~2-3 min/run).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run security audit
        # Transitive-dep advisories not fixable via `cargo update` — review periodically.
        # RUSTSEC-2026-0066/0112/0113/0145: astral-tokio-tar (tar-extraction), dev-only
        #   via the testcontainers dev-dependency — not in the shipped binary.
        # RUSTSEC-2026-0194/0195: quick-xml; fixed in >=0.41 but held <0.41 by
        #   librespot-core 0.8 / plist / knx-rs-prod 0.2 — revisit when those bump.
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0066 \
            --ignore RUSTSEC-2026-0112 \
            --ignore RUSTSEC-2026-0113 \
            --ignore RUSTSEC-2026-0145 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  knxprod:
    name: KNX Product Database
    needs: changes
    if: needs.changes.outputs.knx == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - name: Generate knxprod
        run: |
          mkdir -p knx webui/out
          touch webui/out/index.html
          cargo run -p xtask -- knx/snapdog.xml
      - uses: actions/upload-artifact@v7
        with:
          name: snapdog-knxprod
          path: knx/snapdog.knxprod
          if-no-files-found: error

  windows-check:
    name: Windows Check
    needs: changes
    if: needs.changes.outputs.windows == 'true' && github.event_name == 'pull_request'
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Skip WebUI build (placeholder is generated by snapdog/build.rs)
        shell: bash
        run: echo "SKIP_WEBUI_BUILD=1" >> "$GITHUB_ENV"
      - run: cargo check --all-targets

  # Single required status check. Passes iff every job above succeeded or was
  # skipped (path-filtered), fails if any failed or was cancelled. Branch
  # protection requires only "CI Success", so conditional jobs never wedge a PR.
  ci-success:
    name: CI Success
    if: always()
    needs:
      - changes
      - workflow-lint
      - commit-convention
      - i18n
      - rust-core
      - webui
      - docker-contract
      - integration-tests
      - audit
      - knxprod
      - windows-check
    runs-on: ubuntu-latest
    steps:
      - name: Summarize job results
        run: echo "results = ${{ join(needs.*.result, ', ') }}"
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::One or more CI jobs did not pass (see results above)."
          exit 1
