name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  webui:
    name: WebUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Install dependencies
        working-directory: webui
        run: npm ci --force
      - name: Lint
        working-directory: webui
        run: npm run lint
      - name: Typecheck
        working-directory: webui
        run: npm run typecheck
      - name: Build
        working-directory: webui
        run: npm run build

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci --force && npm run build
      - run: cargo clippy --all-targets -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci --force && npm run build
      - run: cargo test --lib

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      navidrome:
        image: deluan/navidrome:latest
        ports:
          - 4533:4533
        env:
          ND_SCANSCHEDULE: "0"
          ND_LOGLEVEL: error
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci --force && npm run build
      - name: Install snapserver + mosquitto
        run: |
          sudo apt-get update
          sudo apt-get install -y snapserver libasound2-dev libavahi-compat-libdnssd-dev mosquitto
          printf "listener 1883\nallow_anonymous true\n" | sudo tee /etc/mosquitto/conf.d/ci.conf
          sudo systemctl restart mosquitto
      - name: Create test env
        run: |
          cat > .env.test << EOF
          SNAPDOG_TEST_SUBSONIC_URL=http://localhost:4533
          SNAPDOG_TEST_SUBSONIC_USERNAME=admin
          SNAPDOG_TEST_SUBSONIC_PASSWORD=admin
          SNAPDOG_TEST_MQTT_BROKER=localhost:1883
          SNAPDOG_TEST_MQTT_USERNAME=
          SNAPDOG_TEST_MQTT_PASSWORD=
          EOF
      - name: Run integration tests
        run: cargo test --no-default-features --features snapcast-process --test integration -- --test-threads=1

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        # Unfixable transitive deps — review periodically
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0097

  knxprod:
    name: KNX Product Database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - name: Generate knxprod
        run: |
          mkdir -p knx webui/out
          touch webui/out/index.html
          cargo run -p xtask -- knx/snapdog.xml
      - uses: actions/upload-artifact@v7
        with:
          name: snapdog-knxprod
          path: knx/snapdog.knxprod
          if-no-files-found: error

  windows-check:
    name: Windows Check
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci --force && npm run build
      - run: cargo check --all-targets
