name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  commit-convention:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate PR title and every commit
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Same Conventional Commits grammar as .githooks/commit-msg.
          pattern='^(feat|fix|refactor|docs|test|ci|chore|perf|style|build|revert)(\(.+\))?!?: .+'
          fail=0
          if ! printf '%s' "$PR_TITLE" | grep -qE "$pattern"; then
            echo "::error::PR title is not a Conventional Commit: $PR_TITLE"
            fail=1
          fi
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            msg=$(git log -1 --format=%s "$sha")
            printf '%s' "$msg" | grep -qE '^(Merge |Revert )' && continue
            if ! printf '%s' "$msg" | grep -qE "$pattern"; then
              echo "::error::Commit ${sha:0:8} is not a Conventional Commit: $msg"
              fail=1
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "$fail" -ne 0 ]; then
            echo "Format: <type>(<scope>): <description>  — types: feat, fix, refactor, docs, test, ci, chore, perf, style, build, revert (optionally '!' for breaking)."
            exit 1
          fi

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  webui:
    name: WebUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Install dependencies
        working-directory: webui
        run: npm ci --force
      - name: Lint
        working-directory: webui
        run: npm run lint
      - name: Typecheck
        working-directory: webui
        run: npm run typecheck
      - name: Build
        working-directory: webui
        run: npm run build

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci --force && npm run build
      - name: Clippy (default / embedded)
        run: cargo clippy --all-targets -- -D warnings
      # Process mode is a mutually-exclusive feature set the default clippy above
      # never compiles; lint it explicitly so process-only code (snapcast/process.rs,
      # process paths in snapcast/mod.rs, tier-2 tests) can't accumulate lints unseen.
      - name: Clippy (process mode)
        run: cargo clippy -p snapdog --no-default-features --features snapcast-process --all-targets -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci --force && npm run build
      # Whole workspace incl. tier-1 integration targets (in-process, deterministic,
      # no services) — `--lib` skipped tests/*.rs (the IT-0003 suite) and the
      # snapdog-client/-common tests.
      - run: cargo test --workspace
      # Test-harness feature: the F32 send_audio injection test (IT-T55) gated on
      # the ZonePlayerContext::test_pcm_rx seam, which `--workspace` doesn't enable.
      - name: Run test-harness zone-player tests
        run: cargo test -p snapdog --features test-harness --test zone_player
      - name: API + config contract gate (IT-T92 / IT-T14)
        run: cargo test -p snapdog --test openapi_contract --test config_contract
      - name: AirPlay receiver firewall (ap2 mappers, IT-T70/T71)
        # ap2 is off in the default `cargo test --workspace`, so the callback→
        # ReceiverEvent mapper goldens only compile (build-smoke) unless run here.
        run: cargo test -p snapdog --features ap2 --lib receiver::airplay

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      navidrome:
        image: deluan/navidrome:latest
        ports:
          - 4533:4533
        env:
          ND_SCANSCHEDULE: "0"
          ND_LOGLEVEL: error
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci --force && npm run build
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install snapserver + mosquitto
        run: |
          sudo apt-get update
          sudo apt-get install -y snapserver libasound2-dev libavahi-compat-libdnssd-dev mosquitto
          printf "listener 1883\nallow_anonymous true\n" | sudo tee /etc/mosquitto/conf.d/ci.conf
          sudo systemctl restart mosquitto
      - name: Create test env
        run: |
          cat > .env.test << EOF
          SNAPDOG_TEST_SUBSONIC_URL=http://localhost:4533
          SNAPDOG_TEST_SUBSONIC_USERNAME=admin
          SNAPDOG_TEST_SUBSONIC_PASSWORD=admin
          SNAPDOG_TEST_MQTT_BROKER=localhost:1883
          SNAPDOG_TEST_MQTT_USERNAME=
          SNAPDOG_TEST_MQTT_PASSWORD=
          EOF
      - name: Run tier-2 integration tests (process feature)
        # nextest applies the serial `tier2-real-service` group + tier-2-only
        # retries from .config/nextest.toml; each test loud-skips if its service
        # is unavailable. Covers integration (Subsonic/MQTT), the snapcast JSON-RPC
        # firewall, the real-snapserver e2e (IT-T56), and real-mosquitto (IT-T32).
        run: |
          cargo nextest run -p snapdog --profile ci --no-default-features --features snapcast-process \
            -E 'binary(integration) | binary(snapcast_rpc) | binary(snapserver_e2e) | binary(mqtt_tier2)'
      - name: Upload tier-2 test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: tier2-nextest-report
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  build-smoke:
    name: Build Smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    # Gross-signature firewall (IT-T73): every meaningful feature combination must
    # still compile. `snapcast-embedded` XOR `snapcast-process` is a compile_error!
    # guard (main.rs), so this is a flat include-list (one backend per cell) — never
    # a cross-product, never `--all-features`/bare `--no-default-features`.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "embedded (default)", features: "snapcast-embedded,spotify,dbus" }
          - { name: "embedded minimal", features: "snapcast-embedded" }
          - { name: "embedded full", features: "snapcast-embedded,ap2,spotify,dbus,api-docs" }
          - { name: "process minimal", features: "snapcast-process" }
          - { name: "process full", features: "snapcast-process,ap2,spotify,dbus,api-docs" }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      # rust-embed needs webui/out to exist at compile time
      - name: Build WebUI
        working-directory: webui
        run: npm ci --force && npm run build
      - name: cargo check
        run: cargo check -p snapdog --no-default-features --features "${{ matrix.features }}"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        # Transitive-dep advisories not fixable via `cargo update` — review periodically.
        # RUSTSEC-2026-0066/0112/0113/0145: astral-tokio-tar (tar-extraction), dev-only
        #   via the testcontainers dev-dependency — not in the shipped binary.
        # RUSTSEC-2026-0194/0195: quick-xml; fixed in >=0.41 but held <0.41 by
        #   librespot-core 0.8 / plist / knx-rs-prod 0.2 — revisit when those bump.
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0066 \
            --ignore RUSTSEC-2026-0112 \
            --ignore RUSTSEC-2026-0113 \
            --ignore RUSTSEC-2026-0145 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - name: WebUI placeholder (rust-embed needs the dir at build time)
        run: mkdir -p webui/out && touch webui/out/index.html
      - name: Coverage (tier-1, gate on threshold)
        # Default features (snapcast-embedded). Threshold is a regression guard set
        # a few points below the current ~50% line coverage (IT-T92).
        run: cargo llvm-cov -p snapdog --lcov --output-path lcov.info --fail-under-lines 45
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: ignore

  knxprod:
    name: KNX Product Database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - name: Generate knxprod
        run: |
          mkdir -p knx webui/out
          touch webui/out/index.html
          cargo run -p xtask -- knx/snapdog.xml
      - uses: actions/upload-artifact@v7
        with:
          name: snapdog-knxprod
          path: knx/snapdog.knxprod
          if-no-files-found: error

  windows-check:
    name: Windows Check
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Build WebUI
        working-directory: webui
        run: npm ci --force && npm run build
      - run: cargo check --all-targets
