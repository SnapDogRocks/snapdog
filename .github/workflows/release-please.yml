name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # Author the release PR with a GitHub App token, not the default
      # GITHUB_TOKEN. GitHub blocks GITHUB_TOKEN-authored PRs/pushes from
      # triggering other workflows (recursion guard), so ci.yml never ran on the
      # release PR and its required checks stayed stuck. An App token is a real
      # actor, so its pushes DO fire ci.yml.
      # continue-on-error + the `|| secrets.GITHUB_TOKEN` fallback make this a
      # no-op until the two RELEASE_PLEASE_APP_* secrets exist: without them the
      # token step fails softly and release-please falls back to GITHUB_TOKEN
      # (i.e. the old close+reopen workaround still applies).
      - uses: actions/create-github-app-token@v3
        id: app-token
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # release-please bumps the version in Cargo.toml (via extra-files) but never
      # touches Cargo.lock, so main's lockfile would lag one release and dirty every
      # fresh checkout (and now fail the `--locked` CI guard). Sync the lock into the
      # open release PR so merging keeps main current. This push uses the App
      # token (same fallback) so it re-triggers ci.yml on the *new* PR head —
      # required checks are evaluated on the latest commit, so a GITHUB_TOKEN
      # push here would leave the PR blocked. It only pushes to the PR branch
      # (never main), so release-please.yml does not re-run: no loop.
      # ubuntu-latest ships a Rust toolchain, but pin it explicitly so the sync
      # step below doesn't depend on the runner image's preinstalled cargo.
      - name: Set up Rust for the Cargo.lock sync
        if: ${{ steps.rp.outputs.pr }}
        uses: dtolnay/rust-toolchain@stable
      - name: Sync Cargo.lock into the release PR
        if: ${{ steps.rp.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.rp.outputs.pr }}
        run: |
          set -euo pipefail
          branch=$(printf '%s' "$PR_JSON" | jq -r .headBranchName)
          git clone --branch "$branch" --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" rp-lock
          cd rp-lock
          cargo update --workspace -q
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already matches the release version."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: sync Cargo.lock to the release version" -- Cargo.lock
            git push origin "HEAD:$branch"
          fi
      # NOTE: no explicit `gh workflow run release.yml` dispatch here. release-please
      # publishes the GitHub Release with its App token, whose `release: published`
      # event triggers release.yml on its own. An explicit dispatch would build the
      # same version a second time and race on the release-asset / Homebrew / appcast
      # uploads. To rebuild manually: `gh workflow run release.yml --ref vX.Y.Z`.
