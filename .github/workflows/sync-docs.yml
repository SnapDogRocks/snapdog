name: Sync OpenAPI & Docs to Web Portal

on:
  push:
    branches:
      - main
    paths:
      - 'snapdog/src/api/**'
      - 'xtask/**'
      - 'docs/**'

jobs:
  # Gate on the cross-repo token. Secrets can't be read in a job-level `if:`, so a
  # tiny gate job exposes its presence as an output. Without it the sync job is
  # SKIPPED (not failed) — turning a hard "Input required and not supplied: token"
  # error into a visible warning, so a missing secret no longer reddens main.
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.SNAPDOG_WEB_SYNC_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning title=Docs sync skipped::SNAPDOG_WEB_SYNC_TOKEN is not set — skipping sync to SnapDogRocks/snapdog-web. Add a fine-grained PAT with contents:write on that repo as this secret to enable it."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

  sync:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SnapDog Code
        uses: actions/checkout@v6

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev

      - name: Generate OpenAPI Spec
        run: cargo run --package xtask -- gen-api-spec openapi.json

      - name: Checkout SnapDog Web Repo
        uses: actions/checkout@v6
        with:
          repository: SnapDogRocks/snapdog-web
          token: ${{ secrets.SNAPDOG_WEB_SYNC_TOKEN }}
          path: snapdog-web

      - name: Copy Spec and Commit
        run: |
          mkdir -p snapdog-web/src/assets
          cp openapi.json snapdog-web/src/assets/openapi.json
          cd snapdog-web
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add src/assets/openapi.json
            git commit -m "chore(docs): sync API OpenAPI specification"
            git push origin main
          else
            echo "No schema changes detected. Skipping commit."
          fi
