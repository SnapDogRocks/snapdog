name: Sync OpenAPI to Web Portal

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'openapi.json'

permissions:
  contents: read

concurrency:
  group: sync-openapi-to-web
  cancel-in-progress: false

jobs:
  # Gate on the cross-repo token. Secrets can't be read in a job-level `if:`, so a
  # tiny gate job exposes its presence as an output. Without it the sync job is
  # SKIPPED (not failed) — turning a hard "Input required and not supplied: token"
  # error into a visible warning, so a missing secret no longer reddens main.
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.SNAPDOG_WEB_SYNC_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning title=Docs sync skipped::SNAPDOG_WEB_SYNC_TOKEN is not set — skipping sync to SnapDogRocks/snapdog-web. Add a fine-grained PAT with contents:write and pull_requests:write on that repo as this secret to enable it."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

  sync:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SnapDog Code
        uses: actions/checkout@v7

      - name: Checkout SnapDog Web Repo
        uses: actions/checkout@v7
        with:
          repository: SnapDogRocks/snapdog-web
          token: ${{ secrets.SNAPDOG_WEB_SYNC_TOKEN }}
          path: snapdog-web
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snapdog-web/package-lock.json

      - name: Update generated API reference
        run: |
          set -euo pipefail
          mkdir -p snapdog-web/src/assets
          cp openapi.json snapdog-web/src/assets/openapi.json
          cd snapdog-web
          npm ci
          npm run docs:generate
          npm run docs:check
          npm run build

      - name: Create or update pull request and arm auto-merge
        env:
          GH_TOKEN: ${{ secrets.SNAPDOG_WEB_SYNC_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
        working-directory: snapdog-web
        run: |
          set -euo pipefail
          if git diff --quiet -- src/assets/openapi.json src/content/docs/docs/api-reference.mdx; then
            echo "SnapDog Web already contains the OpenAPI contract from $SOURCE_SHA"
            exit 0
          fi

          BRANCH="automation/sync-snapdog-openapi"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add src/assets/openapi.json src/content/docs/docs/api-reference.mdx
          git commit -m "chore(docs): sync SnapDog API contract"
          git push --force-with-lease --set-upstream origin "$BRANCH"

          PR_URL="$(gh pr list --head "$BRANCH" --base main --state open --json url --jq '.[0].url // empty')"
          if [[ -z "$PR_URL" ]]; then
            PR_URL="$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(docs): sync SnapDog API contract" \
              --body "Synchronizes the generated SnapDog REST API contract and reference from commit \`$SOURCE_SHA\`. This PR is generated by the SnapDog API contract workflow.")"
          fi
          gh pr merge "$PR_URL" --auto --squash
