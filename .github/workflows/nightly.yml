name: Nightly

# Comprehensive, non-blocking suite kept off the per-PR critical path: line
# coverage, the full feature-combo build matrix, and a time-based advisory sweep
# (new RUSTSEC advisories appear without any code change). Runs nightly, on every
# push to main (post-merge validation), and on demand.
on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for GITHUB_TOKEN across all jobs (all read-only).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - name: Skip WebUI build (placeholder is generated by snapdog/build.rs)
        shell: bash
        run: echo "SKIP_WEBUI_BUILD=1" >> "$GITHUB_ENV"
      - name: Coverage (tier-1, gate on threshold)
        # Default features (snapcast-embedded). Threshold is a regression guard set
        # a few points below the current ~50% line coverage (IT-T92).
        run: cargo llvm-cov -p snapdog --lcov --output-path lcov.info --fail-under-lines 45
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: ignore

  build-smoke-full:
    name: Build Smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    # Full feature-combo firewall kept off the pull-request critical path.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "embedded (default)", features: "snapcast-embedded,spotify,dbus" }
          - { name: "embedded minimal", features: "snapcast-embedded" }
          - { name: "embedded full", features: "snapcast-embedded,ap2,spotify,dbus,api-docs" }
          - { name: "process minimal", features: "snapcast-process" }
          - { name: "process full", features: "snapcast-process,ap2,spotify,dbus,api-docs" }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libavahi-compat-libdnssd-dev
      - name: Skip WebUI build (placeholder is generated by snapdog/build.rs)
        shell: bash
        run: echo "SKIP_WEBUI_BUILD=1" >> "$GITHUB_ENV"
      - name: cargo check
        run: cargo check -p snapdog --no-default-features --features "${{ matrix.features }}"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      navidrome:
        image: deluan/navidrome:latest
        ports:
          - 4533:4533
        env:
          ND_SCANSCHEDULE: "0"
          ND_LOGLEVEL: error
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: echo "SKIP_WEBUI_BUILD=1" >> "$GITHUB_ENV"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install test services
        run: |
          sudo apt-get update
          sudo apt-get install -y snapserver libasound2-dev libavahi-compat-libdnssd-dev mosquitto
          printf "listener 1883\nallow_anonymous true\n" | sudo tee /etc/mosquitto/conf.d/ci.conf
          sudo systemctl restart mosquitto
      - name: Create test environment
        run: |
          cat > .env.test << EOF
          SNAPDOG_TEST_SUBSONIC_URL=http://localhost:4533
          SNAPDOG_TEST_SUBSONIC_USERNAME=admin
          SNAPDOG_TEST_SUBSONIC_PASSWORD=admin
          SNAPDOG_TEST_MQTT_BROKER=localhost:1883
          SNAPDOG_TEST_MQTT_USERNAME=
          SNAPDOG_TEST_MQTT_PASSWORD=
          EOF
      - name: Run real-service integration tests
        run: |
          cargo nextest run -p snapdog --profile ci --no-default-features --features snapcast-process \
            -E 'binary(integration) | binary(snapcast_rpc) | binary(snapserver_e2e) | binary(mqtt_tier2)'
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: nightly-nextest-report
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  container-images:
    name: Container (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: snapdog
            file: Dockerfile
          - image: snapdog-client
            file: Dockerfile.client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          load: true
          tags: local/${{ matrix.image }}:nightly
          build-args: CARGO_RELEASE_LTO=false
          cache-from: type=gha,scope=nightly-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=nightly-${{ matrix.image }}
          provenance: false
      - name: Verify runtime contract
        env:
          IMAGE: local/${{ matrix.image }}:nightly
        run: |
          set -euo pipefail
          test "$(docker image inspect --format '{{.Config.User}}' "${IMAGE}")" = "10001:10001"
          docker run --rm --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop ALL --security-opt no-new-privileges "${IMAGE}" --version
      - name: Scan runtime image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/${{ matrix.image }}:nightly
          trivy-version: v0.72.0
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  audit-sweep:
    name: Security Audit (advisory sweep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run security audit
        # Same ignore list as ci.yml's dep-triggered audit. This scheduled run
        # catches newly-published advisories against the unchanged Cargo.lock.
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0066 \
            --ignore RUSTSEC-2026-0112 \
            --ignore RUSTSEC-2026-0113 \
            --ignore RUSTSEC-2026-0145 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195
