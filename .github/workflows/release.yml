name: Release

on:
  # Single trigger: release-please publishes the GitHub Release (with its App token,
  # whose events DO trigger workflows). Do NOT add a `push: tags` trigger or a
  # release-please explicit dispatch alongside this — each duplicates the whole build
  # and the duplicates race on the release-asset / Homebrew-tap / R2-appcast uploads.
  # `workflow_dispatch` stays as a manual re-run fallback (`--ref vX.Y.Z`).
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      revision: ${{ steps.meta.outputs.revision }}
      created: ${{ steps.meta.outputs.created }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Parse version
        id: meta
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release workflow must run from a SemVer tag (vX.Y.Z), got: $GITHUB_REF"
            exit 1
          fi
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          REVISION=$(git rev-parse HEAD)
          CREATED=$(git show -s --format=%cI HEAD)
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "revision=${REVISION}"
            echo "created=${CREATED}"
          } >> "$GITHUB_OUTPUT"

  webui:
    name: Build WebUI
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: webui/package-lock.json
      # The Next.js static export is target-independent — build it ONCE here and share
      # it with every build/deb job via the webui-out artifact, instead of re-running
      # npm in each of the 5 build-matrix targets (snapdog embeds it via rust-embed).
      - name: Build WebUI (static export)
        working-directory: webui
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: webui-out
          path: webui/out
          if-no-files-found: error

  knxprod:
    name: Build .knxprod
    needs: [meta, webui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            cmake pkg-config libasound2-dev libavahi-compat-libdnssd-dev
      # snapdog (an xtask dependency) embeds the WebUI via rust-embed; reuse the export so
      # its build.rs does not invoke npm here.
      - name: Fetch pre-built WebUI
        uses: actions/download-artifact@v8
        with:
          name: webui-out
          path: webui/out
      # Regenerate the ETS product database and RSA-sign it WHEN the ETS key secret is
      # present, so released binaries embed a directly ETS-importable .knxprod. Without the
      # secret it is produced unsigned — no break.
      - name: Generate & sign .knxprod
        env:
          ETS_SIGNING_KEY: ${{ secrets.ETS_SIGNING_KEY }}
        run: |
          if [ -n "$ETS_SIGNING_KEY" ]; then
            umask 077
            printf '%s' "$ETS_SIGNING_KEY" > "$RUNNER_TEMP/ets-key.pem"
            export SNAPDOG_ETS_KEY="$RUNNER_TEMP/ets-key.pem"
            echo "::notice::ETS_SIGNING_KEY present — producing a SIGNED .knxprod"
          else
            echo "::warning::ETS_SIGNING_KEY not set — producing an UNSIGNED .knxprod"
          fi
          cargo run -p xtask -- knxprod
          rm -f "$RUNNER_TEMP/ets-key.pem"
      - uses: actions/upload-artifact@v7
        with:
          name: knxprod
          path: knx/snapdog.knxprod
          if-no-files-found: error

  build:
    name: Build (${{ matrix.target }})
    needs: [meta, webui, knxprod]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    # Release artifacts favor build throughput over Thin-LTO's small runtime gain.
    # Keep the profile default for local/non-CI release builds.
    env:
      CARGO_PROFILE_RELEASE_LTO: "false"
    # Linux targets build inside a Debian bookworm container so the binaries link against
    # bookworm's glibc (2.36) — matching the Docker RUNTIME_IMAGE (so the release `docker`
    # job can reuse them with no second compile) and keeping the tarballs/.debs portable to
    # Debian 12+. Native per-arch (amd64 + arm64 runners); no cross-compilation.
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            container: rust:1.97.0-bookworm@sha256:7d0723df719e7f213b69dc7c8c595985c3f4b060cfbee4f7bc0e347a86fe3b6a
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            container: rust:1.97.0-bookworm@sha256:7d0723df719e7f213b69dc7c8c595985c3f4b060cfbee4f7bc0e347a86fe3b6a
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-2025
    steps:
      - uses: actions/checkout@v7.0.0
      # In the bookworm container Rust 1.97 is preinstalled; only the mac/windows runners
      # need rustup plus the cross target installed.
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.container == ''
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install Linux build dependencies
        if: matrix.container != ''
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            cmake pkg-config libasound2-dev libavahi-compat-libdnssd-dev
      # Reuse the WebUI built once in the `webui` job. With webui/out present,
      # snapdog's build.rs early-returns instead of invoking npm — no Node on this runner.
      - name: Fetch pre-built WebUI
        uses: actions/download-artifact@v8
        with:
          name: webui-out
          path: webui/out
      - name: Verify WebUI present
        shell: bash
        run: test -f webui/out/index.html || { echo "::error::webui/out/index.html missing — build.rs would fall back to npm, but no Node is installed here"; exit 1; }
      # Reuse the (signed-if-key) .knxprod built once in the `knxprod` job; snapdog embeds
      # it via include_bytes!, so the download must land before the build.
      - name: Fetch pre-built .knxprod
        uses: actions/download-artifact@v8
        with:
          name: knxprod
          path: knx
      - name: Build release
        run: cargo build --release --timings --target ${{ matrix.target }} -p snapdog -p snapdog-client
      - name: Upload Cargo timings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-timings-${{ matrix.target }}
          path: target/cargo-timings/cargo-timing.html
          if-no-files-found: warn
      - name: Package binary
        shell: bash
        env:
          TAG: ${{ needs.meta.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          archive="snapdog-${TAG}-${TARGET}"
          mkdir "$archive"
          cp "target/${TARGET}/release/snapdog" "$archive/" 2>/dev/null || \
          cp "target/${TARGET}/release/snapdog.exe" "$archive/"
          cp "target/${TARGET}/release/snapdog-client" "$archive/" 2>/dev/null || \
          cp "target/${TARGET}/release/snapdog-client.exe" "$archive/" 2>/dev/null || true
          cp LICENSE README.md "$archive/" 2>/dev/null || true
          if [[ "$TARGET" == *windows* ]]; then
            7z a "${archive}.zip" "$archive"
            sha256sum "${archive}.zip" > "${archive}.zip.sha256"
          else
            tar czf "${archive}.tar.gz" "$archive"
            sha256sum "${archive}.tar.gz" > "${archive}.tar.gz.sha256"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: snapdog-${{ matrix.target }}
          path: |
            snapdog-*.tar.gz
            snapdog-*.tar.gz.sha256
            snapdog-*.zip
            snapdog-*.zip.sha256

  macos-app:
    name: macOS App (.dmg)
    needs: [meta, build]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            # download-artifact doesn't support retry natively, use gh CLI
            gh run download ${{ github.run_id }} \
              --pattern "snapdog-*-apple-darwin" \
              --dir artifacts
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm cert.p12
      - name: Create universal binary
        run: |
          tar xzf artifacts/snapdog-aarch64-apple-darwin/snapdog-*-aarch64-apple-darwin.tar.gz
          tar xzf artifacts/snapdog-x86_64-apple-darwin/snapdog-*-x86_64-apple-darwin.tar.gz
          ARM_BIN=$(find . -name "snapdog" -path "*aarch64-apple-darwin*" -not -name "*.tar.gz" | head -1)
          X86_BIN=$(find . -name "snapdog" -path "*x86_64-apple-darwin*" -not -name "*.tar.gz" | head -1)
          if [ -z "$ARM_BIN" ] || [ -z "$X86_BIN" ]; then
            echo "::error::Could not find binaries: ARM='$ARM_BIN' X86='$X86_BIN'"
            find . -name "snapdog" -type f
            exit 1
          fi
          lipo -create "$ARM_BIN" "$X86_BIN" -output snapdog-universal
          file snapdog-universal
      - name: Build Swift app
        working-directory: macos-helper/SnapDogServer
        run: |
          xcodebuild -project "SnapDog Server.xcodeproj" \
            -scheme "SnapDog Server" \
            -configuration Release \
            -arch arm64 -arch x86_64 \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION=${{ needs.meta.outputs.version }} \
            CURRENT_PROJECT_VERSION=${{ needs.meta.outputs.version }} \
            CODE_SIGN_IDENTITY="Developer ID Application: Fabian Schmieder (${{ secrets.APPLE_TEAM_ID }})" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            build
      - name: Assemble and sign app bundle
        env:
          IDENTITY: "Developer ID Application: Fabian Schmieder (${{ secrets.APPLE_TEAM_ID }})"
        run: |
          APP="SnapDog Server.app"
          BUILD_APP="macos-helper/SnapDogServer/build/Build/Products/Release/SnapDog Server.app"
          cp -R "$BUILD_APP" "$APP"
          mkdir -p "$APP/Contents/Helpers"
          cp snapdog-universal "$APP/Contents/Helpers/snapdog"
          chmod +x "$APP/Contents/Helpers/snapdog"

          sign() { codesign --force --options runtime --timestamp --sign "$IDENTITY" "$@"; }

          # Sign inside-out. Sparkle ships its nested helpers PRE-signed by the Sparkle
          # project (NOT our Developer ID) and xcodebuild does not re-sign them, so
          # notarization rejects them ("not signed with a valid Developer ID" + "no secure
          # timestamp" — MAC-T24). Re-sign every nested Sparkle Mach-O/bundle ourselves,
          # deepest first, then the framework, the helper, and finally the outer app.
          # --timestamp is mandatory for notarization; --deep is intentionally avoided
          # (Apple-deprecated) in favour of this explicit inside-out pass.
          FW="$APP/Contents/Frameworks/Sparkle.framework"
          if [ -d "$FW" ]; then
            V="$FW/Versions/B"
            [ -e "$V/XPCServices/Downloader.xpc" ] && sign "$V/XPCServices/Downloader.xpc"
            [ -e "$V/XPCServices/Installer.xpc" ]  && sign "$V/XPCServices/Installer.xpc"
            [ -e "$V/Autoupdate" ]                 && sign "$V/Autoupdate"
            [ -e "$V/Updater.app" ]                && sign "$V/Updater.app"
            sign "$FW"
          fi
          sign "$APP/Contents/Helpers/snapdog"
          sign "$APP"
          # Guard: fails this job before a broken DMG can ship. (Insufficient on its own —
          # it passes structurally-valid non-Developer-ID signatures — hence the explicit
          # re-signing above; notarization is the real strictness gate.)
          codesign --verify --deep --strict "$APP"
          codesign --display --verbose=2 "$APP" 2>&1 | grep -E "Authority|TeamIdentifier|Sealed" || true
      - name: Create DMG
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          DMG="SnapDog-Server-${VERSION}.dmg"
          brew install create-dmg
          create-dmg \
            --volname "SnapDog Server" \
            --background "assets/dmg-background.png" \
            --window-size 600 400 \
            --icon "SnapDog Server.app" 150 200 \
            --app-drop-link 450 200 \
            --icon-size 80 \
            --no-internet-enable \
            "$DMG" \
            "SnapDog Server.app" || true
          # create-dmg returns 2 on "DMG created but background not set" — still valid
          test -f "$DMG"
      - name: Notarize DMG
        env:
          KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          KEY_P8: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          DMG="SnapDog-Server-${VERSION}.dmg"
          echo "$KEY_P8" | base64 --decode > AuthKey.p8
          # On a rejected submission notarytool exits non-zero but prints only the status,
          # not the per-file reasons — fetch the detailed log so the failure is diagnosable
          # straight from the CI output instead of needing a manual `notarytool log` run.
          set +e
          xcrun notarytool submit "$DMG" \
            --key AuthKey.p8 --key-id "$KEY_ID" --issuer "$ISSUER_ID" \
            --wait --timeout 600 2>&1 | tee notary-submit.txt
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" -ne 0 ]; then
            SUBMIT_ID=$(awk '/id:/{print $2; exit}' notary-submit.txt)
            echo "::error::Notarization failed (rc=$rc). Detailed log for ${SUBMIT_ID}:"
            [ -n "$SUBMIT_ID" ] && xcrun notarytool log "$SUBMIT_ID" \
              --key AuthKey.p8 --key-id "$KEY_ID" --issuer "$ISSUER_ID" || true
            rm -f AuthKey.p8
            exit 1
          fi
          xcrun stapler staple "$DMG"
          rm AuthKey.p8
          shasum -a 256 "$DMG" > "${DMG}.sha256"
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
      - name: Generate Sparkle appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          TAG=${{ needs.meta.outputs.tag }}
          DMG="SnapDog-Server-${VERSION}.dmg"

          # Beta channel: a GitHub prerelease, or a tag carrying a pre-release identifier.
          # Stable items carry no channel (offered to everyone); a beta item is only offered
          # to updaters that opted into the "beta" channel (RFC MAC-0006 MAC-T23).
          CHANNEL_LINE=""
          if [ "$IS_PRERELEASE" = "true" ] || printf '%s' "$TAG" | grep -qiE '\-(beta|rc|alpha|pre)'; then
            CHANNEL_LINE=$'      <sparkle:channel>beta</sparkle:channel>\n'
            echo "Appcast item tagged for the beta channel"
          fi

          # Find sign_update from the Sparkle SPM package resolved during xcodebuild
          SIGN_TOOL=$(find macos-helper/SnapDogServer/build/SourcePackages -name "sign_update" -path "*Sparkle*" 2>/dev/null | head -1)
          if [ -z "$SIGN_TOOL" ]; then
            SIGN_TOOL=$(find ~/Library/Developer/Xcode/DerivedData -name "sign_update" -path "*Sparkle*" 2>/dev/null | head -1)
          fi
          if [ -z "$SIGN_TOOL" ]; then
            echo "::error::sign_update tool not found"
            exit 1
          fi

          # Write key to temp file for signing
          echo "$SPARKLE_KEY" > /tmp/sparkle_key
          SIGNATURE=$("$SIGN_TOOL" "$DMG" --ed-key-file /tmp/sparkle_key | grep "edSignature" | cut -d'"' -f2)
          rm /tmp/sparkle_key

          if [ -z "$SIGNATURE" ]; then
            echo "::error::Failed to generate EdDSA signature"
            exit 1
          fi

          LENGTH=$(stat -f%z "$DMG")

          printf '<?xml version="1.0" encoding="utf-8"?>\n<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">\n  <channel>\n    <title>SnapDog Server</title>\n    <item>\n      <title>Version %s</title>\n%s      <sparkle:version>%s</sparkle:version>\n      <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>\n      <enclosure url="https://github.com/SnapDogRocks/snapdog/releases/download/%s/%s"\n        sparkle:edSignature="%s"\n        length="%s"\n        type="application/octet-stream"/>\n    </item>\n  </channel>\n</rss>\n' "$VERSION" "$CHANNEL_LINE" "$VERSION" "$TAG" "$DMG" "$SIGNATURE" "$LENGTH" > appcast.xml
      - uses: actions/upload-artifact@v7
        with:
          name: snapdog-macos-app
          path: |
            SnapDog-Server-*.dmg
            SnapDog-Server-*.dmg.sha256
            appcast.xml

  build-deb:
    name: Debian ${{ matrix.pkg }} (${{ matrix.arch }})
    needs: [meta, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pkg: snapdog,        arch: amd64, target: x86_64-unknown-linux-gnu }
          - { pkg: snapdog,        arch: arm64, target: aarch64-unknown-linux-gnu }
          - { pkg: snapdog-client, arch: amd64, target: x86_64-unknown-linux-gnu }
          - { pkg: snapdog-client, arch: arm64, target: aarch64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-deb
        run: cargo install cargo-deb
      # Reuse the binary already compiled by the `build` job (bookworm glibc, so the .deb
      # runs on Debian 12+ and matching distros) — no second snapdog compile, no WebUI
      # rebuild, and no native arm64 runner: cargo-deb sets Architecture from --target, so
      # both arches package on amd64.
      - name: Fetch pre-built binaries
        uses: actions/download-artifact@v8
        with:
          name: snapdog-${{ matrix.target }}
          path: dist
      - name: Stage binary where cargo-deb expects it
        run: |
          tar xzf dist/snapdog-*-${{ matrix.target }}.tar.gz -C dist
          bin=$(find dist -type f -name '${{ matrix.pkg }}' | head -1)
          test -n "$bin" || { echo "::error::${{ matrix.pkg }} binary not in artifact"; find dist -type f; exit 1; }
          install -Dm755 "$bin" "target/${{ matrix.target }}/release/${{ matrix.pkg }}"
      # --no-strip: the binaries are already stripped ([profile.release] strip = true),
      # and host strip/objcopy on this amd64 runner can't process the aarch64 ELF.
      # cargo-deb writes to target/debian/ regardless of --target (arch is in the filename).
      - name: Package .deb
        run: cargo deb -p ${{ matrix.pkg }} --target ${{ matrix.target }} --no-build --no-strip
      - uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.pkg }}-${{ matrix.arch }}
          path: target/debian/*.deb
          if-no-files-found: error

  upload-release-artifacts:
    name: Upload Release Artifacts
    runs-on: ubuntu-latest
    needs: [meta, build, build-deb, knxprod, macos-app]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.macos-app.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect assets
        run: |
          mkdir release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.tar.gz.sha256" -o -name "*.zip" -o -name "*.zip.sha256" -o -name "*.dmg" -o -name "*.dmg.sha256" -o -name "*.deb" -o -name "*.knxprod" \) -exec cp {} release-assets/ \;
          cd release-assets && sha256sum ./* > SHA256SUMS
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.meta.outputs.tag }}" release-assets/* \
            --repo "${{ github.repository }}" --clobber

  update-appcast:
    name: Update Sparkle Appcast
    needs: [meta, macos-app, upload-release-artifacts]
    if: ${{ needs.macos-app.result == 'success' && needs.upload-release-artifacts.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/download-artifact@v8
        with:
          name: snapdog-macos-app
          path: artifacts
      - name: Merge into the existing appcast and upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm install -g wrangler
          # Merge the freshly-built single-item appcast into the current one so the latest
          # stable and beta builds coexist (channel gating, RFC MAC-0006 MAC-T23). Fail-safe:
          # if there is no existing appcast (or it can't be fetched), publish the new one.
          if wrangler r2 object get snapdog-updates/helper/appcast.xml \
              --file existing-appcast.xml --remote 2>/dev/null && [ -s existing-appcast.xml ]; then
            echo "Merging into the existing appcast."
            python3 macos-helper/merge-appcast.py artifacts/appcast.xml existing-appcast.xml merged-appcast.xml
          else
            echo "No existing appcast on R2; publishing the new one."
            cp artifacts/appcast.xml merged-appcast.xml
          fi
          wrangler r2 object put snapdog-updates/helper/appcast.xml \
            --file merged-appcast.xml \
            --content-type "application/xml" \
            --remote

  update-homebrew:
    name: Update Homebrew Tap
    needs: [meta, upload-release-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Update tap formulas
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          TAG=${{ needs.meta.outputs.tag }}

          # Calculate checksums for macOS binaries
          SNAPDOG_X64_SHA=$(sha256sum artifacts/snapdog-${TAG}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SNAPDOG_ARM_SHA=$(sha256sum artifacts/snapdog-${TAG}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          CLIENT_X64_SHA=$(sha256sum artifacts/snapdog-${TAG}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          CLIENT_ARM_SHA=$(sha256sum artifacts/snapdog-${TAG}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/SnapDogRocks/homebrew-tap.git"
          cd homebrew-tap
          mkdir -p Formula

          cat > Formula/snapdog.rb << EOF
          class Snapdog < Formula
            desc "Multi-zone audio controller with AirPlay, Snapcast, MQTT, and KNX"
            homepage "https://github.com/SnapDogRocks/snapdog"
            license "GPL-3.0-only"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/SnapDogRocks/snapdog/releases/download/${TAG}/snapdog-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SNAPDOG_X64_SHA}"
              else
                url "https://github.com/SnapDogRocks/snapdog/releases/download/${TAG}/snapdog-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SNAPDOG_ARM_SHA}"
              end
            end

            def install
              bin.install "snapdog"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/snapdog --version")
            end
          end
          EOF

          cat > Formula/snapdog-client.rb << EOF
          class SnapdogClient < Formula
            desc "SnapDog multiroom audio client"
            homepage "https://github.com/SnapDogRocks/snapdog"
            license "GPL-3.0-only"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/SnapDogRocks/snapdog/releases/download/${TAG}/snapdog-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${CLIENT_X64_SHA}"
              else
                url "https://github.com/SnapDogRocks/snapdog/releases/download/${TAG}/snapdog-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${CLIENT_ARM_SHA}"
              end
            end

            def install
              bin.install "snapdog-client"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/snapdog-client --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/snapdog.rb Formula/snapdog-client.rb
          git commit -m "Update snapdog to ${VERSION}"
          git push

  publish-aur:
    name: AUR (${{ matrix.pkg }})
    needs: [meta, upload-release-artifacts]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - pkg: snapdog
            pkgbuild: aur/snapdog/PKGBUILD
          - pkg: snapdog-client
            pkgbuild: aur/snapdog-client/PKGBUILD
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Update PKGBUILD version
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" ${{ matrix.pkgbuild }}
          sed -i "s/^pkgrel=.*/pkgrel=1/" ${{ matrix.pkgbuild }}
      - uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ${{ matrix.pkg }}
          pkgbuild: ${{ matrix.pkgbuild }}
          commit_username: metaneutrons
          commit_email: aur@metaneutrons.github.io
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.meta.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

  publish-apt:
    name: Publish APT Repository
    needs: [meta, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: gh-pages
          path: gh-pages
      - uses: actions/download-artifact@v8
        with:
          pattern: deb-*
          path: debs
          merge-multiple: true
      - name: Update APT repository
        run: |
          mkdir -p gh-pages/debian/pool gh-pages/debian/dists/stable/main/binary-amd64 gh-pages/debian/dists/stable/main/binary-arm64

          # Copy new .deb files to pool
          find debs -name "*.deb" -exec cp {} gh-pages/debian/pool/ \;

          # Generate Packages index for each arch
          cd gh-pages/debian
          for arch in amd64 arm64; do
            dpkg-scanpackages --arch "$arch" pool > "dists/stable/main/binary-${arch}/Packages"
            gzip -kf "dists/stable/main/binary-${arch}/Packages"
          done

          # Generate Release file with Date and hashes
          {
            echo "Origin: SnapDog"
            echo "Label: SnapDog"
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Date: $(date -Ru)"
            echo "Architectures: amd64 arm64"
            echo "Components: main"
            echo "Description: SnapDog multi-room audio system"
            echo "MD5Sum:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz main/binary-arm64/Packages main/binary-arm64/Packages.gz; do
              echo " $(md5sum "dists/stable/$f" | cut -d' ' -f1) $(stat -c%s "dists/stable/$f") $f"
            done
            echo "SHA256:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz main/binary-arm64/Packages main/binary-arm64/Packages.gz; do
              echo " $(sha256sum "dists/stable/$f" | cut -d' ' -f1) $(stat -c%s "dists/stable/$f") $f"
            done
          } > dists/stable/Release
      - name: Push to gh-pages
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "apt: update packages for ${{ needs.meta.outputs.tag }}"
          git push

  docker:
    name: Docker ${{ matrix.image }}
    # Reuse the Linux binaries compiled once by the `build` job instead of recompiling
    # snapdog inside Docker per arch. The binary is only COPYd (never recompiled), so a
    # single multi-arch buildx build is cheap; only the small runtime layer (apt + user
    # setup) runs under arm64 emulation — hence setup-qemu-action below. The container then
    # ships the exact same binary as the tarball.
    needs: [meta, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: snapdog
            file: Dockerfile
            repo: ghcr.io/snapdogrocks/snapdog
          - image: snapdog-client
            file: Dockerfile.client
            repo: ghcr.io/snapdogrocks/snapdog-client
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The prebuilt binary is only COPYd, but the runtime stage still RUNs apt-get +
      # groupadd/useradd, which execute as the target arch — so building the arm64 layer on
      # this amd64 runner needs a binfmt/QEMU handler registered. amd64 is native.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch pre-built Linux binaries
        uses: actions/download-artifact@v8
        with:
          pattern: snapdog-*-unknown-linux-gnu
          path: dl
      - name: Stage binaries for the prebuilt Docker stage
        shell: bash
        run: |
          set -euo pipefail
          declare -A arch=( [x86_64-unknown-linux-gnu]=amd64 [aarch64-unknown-linux-gnu]=arm64 )
          for triple in "${!arch[@]}"; do
            tb=$(find dl -type f -name "snapdog-*-${triple}.tar.gz" | head -1)
            test -n "$tb" || { echo "::error::missing ${triple} tarball in build artifacts"; find dl -type f; exit 1; }
            mkdir -p "extract/${triple}"
            tar xzf "$tb" -C "extract/${triple}"
            bin=$(find "extract/${triple}" -type f -name "${{ matrix.image }}" | head -1)
            test -n "$bin" || { echo "::error::${{ matrix.image }} not in ${triple} tarball"; find "extract/${triple}" -type f; exit 1; }
            install -Dm0755 "$bin" "bins/${arch[$triple]}/${{ matrix.image }}"
          done
          ls -R bins
      - name: Compute image tags
        id: tags
        shell: bash
        env:
          REPO: ${{ matrix.repo }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail
          tags="${REPO}:${TAG}"
          # Only a final release (no pre-release identifier) moves the :latest tag.
          if [[ "${TAG}" != *-* ]]; then
            tags="${tags}"$'\n'"${REPO}:latest"
          fi
          { echo 'list<<EOF'; printf '%s\n' "$tags"; echo 'EOF'; } >> "$GITHUB_OUTPUT"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - name: Build and push multi-arch image (prebuilt binary — no recompile)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          build-args: |
            BIN_STAGE=prebuilt
            BUILD_VERSION=${{ needs.meta.outputs.version }}
            BUILD_REVISION=${{ needs.meta.outputs.revision }}
            BUILD_CREATED=${{ needs.meta.outputs.created }}
          provenance: mode=max
          sbom: true
      - name: Smoke-test the published image (both arches)
        env:
          REF: ${{ matrix.repo }}:${{ needs.meta.outputs.tag }}
        run: |
          set -euo pipefail
          # Pull-and-run each published variant to prove the prebuilt binary is placed
          # correctly and is glibc-compatible with the runtime. amd64 runs natively; arm64
          # runs via the QEMU binfmt handler registered above. The release (prebuilt) path is
          # NOT covered by the PR container-images job, which builds BIN_STAGE=compile.
          for platform in linux/amd64 linux/arm64; do
            echo "::group::smoke ${platform}"
            docker run --rm --platform "${platform}" "${REF}" --version
            echo "::endgroup::"
          done
      - name: Sign the published image by digest
        env:
          REPO: ${{ matrix.repo }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::build-push-action returned no valid image digest: '${DIGEST}'"
            exit 1
          fi
          cosign sign --yes "${REPO}@${DIGEST}"

  bump-snapdog-os:
    name: Bump version in snapdog-os
    needs: [meta, upload-release-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          repository: SnapDogRocks/snapdog-os
          token: ${{ secrets.SNAPDOG_OS_PAT }}
          ref: main
      - name: Update version in buildroot packages
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          sed -i "s/^SNAPDOG_SERVER_VERSION = .*/SNAPDOG_SERVER_VERSION = ${VERSION}/" \
            buildroot/package/snapdog-server/snapdog-server.mk
          sed -i "s/^SNAPDOG_CLIENT_VERSION = .*/SNAPDOG_CLIENT_VERSION = ${VERSION}/" \
            buildroot/package/snapdog-client/snapdog-client.mk
          
          # Fetch the checksum of the new release tarball and update the hash file
          URL="https://github.com/SnapDogRocks/snapdog/releases/download/v${VERSION}/SHA256SUMS"
          FILE="snapdog-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
          # Exact filename match: a plain grep for "…tar.gz" ALSO matches the
          # "…tar.gz.sha256" line, so `awk '{print $1}'` captured two hashes and
          # wrote a malformed two-line .hash (Buildroot then errors "No hash found").
          # Strip sha256sum's optional leading "./", then select only the tarball.
          HASH=$(curl -fsSL "$URL" | awk -v f="$FILE" '{ name = $2; sub(/^\.\//, "", name); if (name == f) print $1 }')
          if ! printf '%s' "$HASH" | grep -qE '^[0-9a-f]{64}$'; then
            echo "::error::Expected one sha256 for ${FILE} from ${URL}, got: '${HASH}'"
            exit 1
          fi
          printf '# Remote SnapDog release artifact.\nsha256  %s  %s\n' "$HASH" "$FILE" \
            > buildroot/package/snapdog-client/snapdog-client.hash
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SNAPDOG_OS_PAT }}
          commit-message: "chore(deps): bump snapdog to ${{ needs.meta.outputs.version }}"
          title: "chore(deps): bump snapdog to ${{ needs.meta.outputs.version }}"
          body: |
            Automated version bump from [snapdog ${{ needs.meta.outputs.tag }}](https://github.com/SnapDogRocks/snapdog/releases/tag/${{ needs.meta.outputs.tag }}).

            This is a **rolling** PR: a later snapdog release re-pushes this same
            branch and updates this PR in place (new version, hash, title) instead
            of opening another one. Merge it whenever the OS should pick up snapdog.
          # Stable branch name (NOT `deps/snapdog-<version>`): peter-evans reuses an
          # open PR on this branch and force-updates it each release, so successive
          # releases roll one PR forward instead of stacking a new deps PR every time.
          # On merge the branch is deleted and the next release recreates it fresh.
          branch: deps/snapdog
          delete-branch: true
